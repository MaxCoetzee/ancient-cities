<!DOCTYPE html>
<html lang="en">
<head>
    <title>Map of Prehistoric Towns and Cities</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="description" content="map of prehistoric towns and cities">

    <link
        rel="stylesheet"
        href="https://unpkg.com/maplibre-gl@5.22.0/dist/maplibre-gl.css"
    >
    <script src="https://unpkg.com/maplibre-gl@5.22.0/dist/maplibre-gl.js"></script>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .maplibregl-ctrl-attrib {
            font-size: 11px;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script>
        const map = new maplibregl.Map({
            container: "map",
            center: [0, 20],
            zoom: 1.6,
            pitch: 0,
            bearing: 0,
            attributionControl: true,
            style: {
                version: 8,
                sources: {
                    satellite: {
                        type: "raster",
                        tiles: [
                            "https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2020_3857/default/g/{z}/{y}/{x}.jpg"
                        ],
                        tileSize: 256,
                        attribution: "Sentinel-2 cloudless via EOX"
                    }
                },
                layers: [
                    {
                        id: "satellite",
                        type: "raster",
                        source: "satellite"
                    }
                ]
            }
        });

        map.on("style.load", () => {
            map.setProjection({
                type: "globe"
            });
        });

        map.addControl(new maplibregl.NavigationControl(), "top-right");
    </script>
</body>
</html>
